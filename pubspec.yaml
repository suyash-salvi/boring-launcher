name: my_first_app
description: "A minimalist, no-distraction phone launcher."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  installed_apps: ^1.4.1
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  permission_handler: ^11.3.1
  fluttertoast: ^8.2.10
  android_intent_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
